# Configuracao geral da API
quarkus.http.port=${PORT}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Datasource padrao (ajuste via variaveis de ambiente quando necessario)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD:DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/comoequefaz}

# Ambiente de desenvolvimento
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.sql-load-script=import.sql

# Ambiente de teste com banco em memoria
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=no-file
